services:

  mcp-server:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    environment:
      PORT: "8000"
      DOCS_DIR: /app/docs
    ports:
      # Also exposed to host so the Inspector UI (running in browser) can reach it
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/mcp')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  mcp-inspector:
    build:
      context: ./inspector
    ports:
      - "6274:6274"   # Inspector web UI
    depends_on:
      mcp-server:
        condition: service_healthy

  cli-chat:
    build:
      context: .
      dockerfile: cli_chat/Dockerfile
    env_file:
      - .env
    environment:
      # Default — override in .env if needed
      MCP_SERVER_URL: http://mcp-server:8000/mcp
    stdin_open: true
    tty: true
    depends_on:
      mcp-server:
        condition: service_healthy
    profiles:
      # Not started by "docker compose up" — run explicitly with:
      #   docker compose run --rm cli-chat
      - interactive
